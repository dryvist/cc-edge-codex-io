output: default
streamtags: []
groups: {}
asyncFuncTimeout: 1000
description: >-
  Codex CLI session transcript pipeline. Stamps Splunk-canonical fields
  (sourcetype, index) on every rollout JSONL event; datatype already
  arrives from the input's metadata.
functions:
  - id: eval
    filter: "true"
    disabled: false
    conf:
      add:
        - name: sourcetype
          value: "'codex:cli:session'"
        - name: index
          value: "'main'"
